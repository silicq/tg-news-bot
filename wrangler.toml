name = "tg-news-bot"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# How often the bot runs. Default: every 3 hours = 8 runs/day.
# Suggested alternatives: "0 */4 * * *" (6/day) or "0 6,12,18 * * *" (3/day).
# Keep this in mind for the neuron budget — see README.
[triggers]
crons = ["0 */3 * * *"]

# Workers AI binding -> env.AI
[ai]
binding = "AI"

# Cloudflare Images binding -> env.IMAGES (used to overlay the watermark off-Worker).
# Free plan includes 5000 transformations/month; our usage is a handful per day.
[images]
binding = "IMAGES"

# D1 (SQLite) binding -> env.DB
# Create the DB once with:  wrangler d1 create news_bot
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "news_bot"
database_id = "fe58b4ce-afc7-41d3-8459-58f4691d9c37"
migrations_dir = "migrations"

# -----------------------------------------------------------------------------
# Non-secret configuration. Secrets are NOT here — set them in the dashboard or
# via `wrangler secret put`:
#   TELEGRAM_BOT_TOKEN    — bot token from @BotFather
#   ADMIN_ID              — your Telegram user id (only admin can run commands)
#   MANUAL_TRIGGER_TOKEN  — protects GET /run & /setup, also the webhook secret
# -----------------------------------------------------------------------------
[vars]
# Channel id (@username) or numeric id. The bot must be an admin of the channel.
TELEGRAM_CHANNEL_ID = -1003770441052

# RSS/Atom sources as a JSON array (single-quoted TOML literal, no escaping needed).
RSS_FEEDS = '["https://www.sciencedaily.com/rss/top/science.xml","https://www.nasa.gov/feed/","https://www.goodnewsnetwork.org/feed/","https://www.positive.news/feed/","https://www.smithsonianmag.com/rss/latest_articles/","https://www.atlasobscura.com/feeds/latest"]'

# Audience / topic description used to rank news. Keep it specific.
CHANNEL_THEME = "Позитивный канал для поднятия настроения. Темы: животные, юмор и смешное, наука, космос, дизайн, удивительные факты о мире. Отбирай добрые, любопытные, вдохновляющие новости. Исключай негатив, политику, трагедии, насилие, тяжёлые темы."

# Caption language code and tone.
CAPTION_LANG = "ru"
CAPTION_TONE = "живой, тёплый, с лёгкой интригой, без кликбейта-обмана"

# Label shown on the source link at the end of each caption.
SOURCE_LABEL = "Источник"

# Channel credit added to every caption as a clickable link.
CREDIT_TEXT = "@monkeydiary"
CREDIT_URL = "https://t.me/monkeydiary"

# Only consider feed entries newer than this many hours.
MAX_AGE_HOURS = "24"

# Posting caps. Budget is plentiful (~50-60 neurons/post), so this is well
# within the free tier — tune to taste.
MAX_POSTS_PER_RUN = "2"
MAX_POSTS_PER_DAY = "8"

# Minimum AI relevance score (0-100) required to publish.
MIN_SCORE = "55"

# Image strategy:
#   "generate" (default) — generate with Workers AI, fall back to og:image
#                          when the neuron budget is low or generation fails.
#   "og_first"          — try the article's og:image first (free in neurons),
#                          generate only when no og:image exists. Stretches the
#                          free tier and allows many more posts.
IMAGE_MODE = "generate"

# When remaining neurons drop below this, skip generation and use og:image.
OG_FALLBACK_NEURON_THRESHOLD = "2000"

# What to do when there is no image at all (no generated image AND no og:image):
#   "og"   (default) — post anyway as a text message (image was preferred but optional)
#   "text"           — post as a text message
#   "skip"           — skip the post
NO_IMAGE_BEHAVIOR = "og"

# Daily neuron safety budget. The free tier is 10000/day; we stay under it.
DAILY_NEURON_BUDGET = "9000"

# Workers AI model IDs (verified against Cloudflare docs, June 2026).
# Text model: cheap + fast. Swap to @cf/meta/llama-3.3-70b-instruct-fp8-fast
# for higher-quality ranking if your budget allows.
TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"
# Primary image model: flux-1-schnell — best "AI look", cheap neurons.
# NOTE: flux-1-schnell ALWAYS returns a square image (it has no width/height
# parameter). IMAGE_WIDTH/HEIGHT below apply only to the fallback/SDXL models.
IMAGE_MODEL = "@cf/bytedance/stable-diffusion-xl-lightning"
# Diffusion steps for flux-1-schnell (default 4, max 8). Fewer = cheaper.
IMAGE_STEPS = "4"

# Free fallback image model. Used when the neuron budget is low or the primary
# model fails — keeps the AI-generated look (instead of jumping to og:image).
# This SDXL model honours width/height, so the fallback comes out 16:9.
# Other free options: @cf/stabilityai/stable-diffusion-xl-base-1.0,
# @cf/lykon/dreamshaper-8-lcm, @cf/runwayml/stable-diffusion-v1-5-img2img.
IMAGE_MODEL_FALLBACK = "@cf/bytedance/stable-diffusion-xl-lightning"
IMAGE_STEPS_FALLBACK = "8"

# Target size for models that accept width/height (the SDXL family). 1280x720 = 16:9.
# Want 16:9 on EVERY post? Set IMAGE_MODEL to an SDXL model (flux can't do it).
IMAGE_WIDTH = "1280"
IMAGE_HEIGHT = "720"

# Watermark (overlaid off-Worker via the Images binding). Text/font are baked
# into src/watermark-asset.ts — re-run scripts/make-watermark.mjs to change them.
WATERMARK_ENABLED = "true"
WATERMARK_OPACITY = "0.55"
WATERMARK_PADDING = "28"

# --- Estimated neuron cost per AI operation (the AI binding does NOT report
# --- real usage, so the budget guard works off these deliberately-generous
# --- estimates). See README for the math. ---
EST_NEURONS_RANK = "60"
EST_NEURONS_CAPTION = "30"
EST_NEURONS_IMAGE_PROMPT = "15"
EST_NEURONS_IMAGE = "150"
# Fallback SDXL models are free in neurons.
EST_NEURONS_IMAGE_FALLBACK = "0"

# Delete posted-history rows older than this many days (keeps D1 small).
HISTORY_RETENTION_DAYS = "30"
