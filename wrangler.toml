name = "tg-news-bot"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Runs hourly so posts are spread evenly through the day (1 per run) instead of
# bursts. Quiet hours skip the nighttime runs. Actual posts/day ≈ active runs ×
# MAX_POSTS_PER_RUN, capped by MAX_POSTS_PER_DAY.
# Hourly posting run + a daily reaction review at 23:50 UTC (before the neuron
# limits reset), which learns what the audience likes from 👍/👎.
[triggers]
crons = ["0 * * * *", "50 23 * * *"]

# Workers AI binding -> env.AI
[ai]
binding = "AI"

# Cloudflare Images binding -> env.IMAGES (used to overlay the watermark off-Worker).
# Free plan includes 5000 transformations/month; our usage is a handful per day.
[images]
binding = "IMAGES"

# D1 (SQLite) binding -> env.DB
# Create the DB once with:  wrangler d1 create news_bot
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "news_bot"
database_id = "fe58b4ce-afc7-41d3-8459-58f4691d9c37"
migrations_dir = "migrations"

# -----------------------------------------------------------------------------
# Non-secret configuration. Secrets are NOT here — set them in the dashboard or
# via `wrangler secret put`:
#   TELEGRAM_BOT_TOKEN    — bot token from @BotFather
#   ADMIN_ID              — your Telegram user id (only admin can run commands)
#   MANUAL_TRIGGER_TOKEN  — protects GET /run & /setup, also the webhook secret
# -----------------------------------------------------------------------------
[vars]
# Channel id (@username) or numeric id. The bot must be an admin of the channel.
TELEGRAM_CHANNEL_ID = -1003770441052

# RSS/Atom sources as a JSON array (single-quoted TOML literal, no escaping needed).
RSS_FEEDS = '["https://www.sciencedaily.com/rss/top/science.xml","https://www.nasa.gov/feed/","https://www.goodnewsnetwork.org/feed/","https://www.positive.news/feed/","https://www.smithsonianmag.com/rss/latest_articles/","https://www.atlasobscura.com/feeds/latest","https://www.sciencealert.com/feed","https://phys.org/rss-feed/","https://www.thisiscolossal.com/feed/","https://mymodernmet.com/feed/","https://earthsky.org/feed/","https://www.nicenews.com/feed/","https://reasonstobecheerful.world/feed/","https://www.iflscience.com/rss.xml"]'

# Audience / topic description used to rank news. Keep it specific.
CHANNEL_THEME = "Позитивный канал для поднятия настроения. Темы: животные, юмор и смешное, наука, космос, дизайн, удивительные факты о мире. Отбирай добрые, любопытные, вдохновляющие новости. Исключай негатив, политику, трагедии, насилие, тяжёлые темы."

# Caption language code and tone.
CAPTION_LANG = "ru"
CAPTION_TONE = "живой, тёплый, с лёгкой интригой, без кликбейта-обмана"
# Let the model emphasize with <b>/<i>/<u> in the caption (sanitized). false = plain text.
CAPTION_FORMATTING = "true"

# Label shown on the source link at the end of each caption.
SOURCE_LABEL = "Источник"

# Channel credit added to every caption as a clickable link.
CREDIT_TEXT = "@monkeydiary"
CREDIT_URL = "https://t.me/monkeydiary"

# Only consider feed entries newer than this many hours.
MAX_AGE_HOURS = "24"

# Posting caps. 1 post per hourly run spreads them across the day; the day cap
# keeps the total sane. Budget has plenty of headroom.
MAX_POSTS_PER_RUN = "1"
MAX_POSTS_PER_DAY = "16"

# Minimum AI relevance score (0-100) required to publish.
MIN_SCORE = "55"

# Topic dedup: drop the same story when it appears across multiple feeds, and
# skip headlines too similar to recently posted ones. SIMILARITY_THRESHOLD is
# the overlap cutoff over title words (0-1): higher = stricter (fewer merges).
TOPIC_DEDUP = "true"
SIMILARITY_THRESHOLD = "0.5"

# Quiet hours: no posting when start <= local hour < end, in the audience
# timezone (TZ_OFFSET_HOURS from UTC). Default: no posts 00:00-08:00 MSK.
# Set QUIET_START_HOUR == QUIET_END_HOUR to disable.
QUIET_START_HOUR = "0"
QUIET_END_HOUR = "8"
TZ_OFFSET_HOURS = "3"

# Health alerting: DM the admin (ADMIN_ID) when a run crashes, every post fails,
# or RSS returns nothing for HEALTH_EMPTY_STREAK runs in a row. Re-alerts at most
# once per HEALTH_COOLDOWN_HOURS, and sends a "recovered" notice afterwards.
HEALTH_ALERTS = "true"
HEALTH_EMPTY_STREAK = "3"
HEALTH_COOLDOWN_HOURS = "6"

# Image strategy:
#   "generate" (default) — generate with Workers AI, fall back to og:image
#                          when the neuron budget is low or generation fails.
#   "og_first"          — try the article's og:image first (free in neurons),
#                          generate only when no og:image exists. Stretches the
#                          free tier and allows many more posts.
IMAGE_MODE = "generate"

# When remaining neurons drop below this, skip generation and use og:image.
OG_FALLBACK_NEURON_THRESHOLD = "2000"

# What to do when there is no image at all (no generated image AND no og:image):
#   "og"   (default) — post anyway as a text message (image was preferred but optional)
#   "text"           — post as a text message
#   "skip"           — skip the post
NO_IMAGE_BEHAVIOR = "og"

# Daily neuron safety budget. The free tier is 10000/day; we stay under it.
DAILY_NEURON_BUDGET = "9000"

# Workers AI model IDs (verified against Cloudflare docs, June 2026).
# Text model: cheap + fast. Swap to @cf/meta/llama-3.3-70b-instruct-fp8-fast
# for higher-quality ranking if your budget allows.
TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"
# Primary image model: SDXL base — good quality, honours width/height (16:9),
# works with the standard binding. NOTE: flux-2-klein looks great but needs a
# multipart request the simple binding doesn't do (AiError 5006); flux-1-schnell
# works but is square-only. For a lighter/faster option use the lightning model.
IMAGE_MODEL = "@cf/stabilityai/stable-diffusion-xl-base-1.0"
# num_steps for the primary SDXL model (max 20 for sdxl-base). Higher = better.
IMAGE_STEPS = "20"

# Free fallback image model. Used when the neuron budget is low or the primary
# model fails — keeps the AI-generated look (instead of jumping to og:image).
# This SDXL model honours width/height, so the fallback comes out 16:9.
# Other free options: @cf/stabilityai/stable-diffusion-xl-base-1.0,
# @cf/lykon/dreamshaper-8-lcm, @cf/runwayml/stable-diffusion-v1-5-img2img.
IMAGE_MODEL_FALLBACK = "@cf/bytedance/stable-diffusion-xl-lightning"
IMAGE_STEPS_FALLBACK = "8"

# Target size for models that accept width/height (the SDXL family). 1280x720 = 16:9.
# Want 16:9 on EVERY post? Set IMAGE_MODEL to an SDXL model (flux can't do it).
IMAGE_WIDTH = "1280"
IMAGE_HEIGHT = "720"

# Watermark (overlaid off-Worker via the Images binding). Text/font are baked
# into src/watermark-asset.ts — re-run scripts/make-watermark.mjs to change them.
WATERMARK_ENABLED = "true"
WATERMARK_OPACITY = "0.55"
WATERMARK_PADDING = "28"

# Telegra.ph article with a full AI translation of the original story. The post
# caption gets a "📖 Перевод" link. The article includes the original images,
# a source link, a note on how it was translated and an AI-error disclaimer.
# The Telegraph account token is created automatically and stored in D1.
TELEGRAPH_ENABLED = "true"
TELEGRAPH_AUTHOR_NAME = "@monkeydiary"
TELEGRAPH_AUTHOR_URL = "https://t.me/monkeydiary"
ARTICLE_MAX_BLOCKS = "25"
ARTICLE_READ_LABEL = "📖 Перевод"
# Max original article photos to add to an album post (0 disables album images).
ARTICLE_MAX_IMAGES = "2"

# Show source/translation links as tappable inline buttons under the post
# (cleaner) instead of links inside the caption text. The @monkeydiary credit
# stays on the image watermark, so it isn't duplicated as a button.
BUTTONS_ENABLED = "true"

# Category label at the top of each post (🌌 Космос / 🐾 Животные / …). Free.
RUBRICS_ENABLED = "true"

# When the article has original photos, post [AI-image + up to ARTICLE_MAX_IMAGES
# originals] as an album. Albums can't have inline buttons, so links go in the
# caption for those posts.
ALBUMS_ENABLED = "true"

# Learn audience taste from 👍/👎 reactions and fold it into ranking (reviewed
# once a day). Requires reactions enabled on the channel.
REACTIONS_ENABLED = "true"
# Translation model (defaults to TEXT_MODEL). m2m100 etc. can be set here.
# TRANSLATE_MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"

# --- Estimated neuron cost per AI operation (the AI binding does NOT report
# --- real usage, so the budget guard works off these deliberately-generous
# --- estimates). See README for the math. ---
EST_NEURONS_RANK = "60"
EST_NEURONS_CAPTION = "30"
EST_NEURONS_IMAGE_PROMPT = "15"
EST_NEURONS_IMAGE = "150"
# Fallback SDXL models are free in neurons.
EST_NEURONS_IMAGE_FALLBACK = "0"
# Full-article translation (several batched LLM calls). Generous estimate.
EST_NEURONS_TRANSLATE = "250"

# Delete posted-history rows older than this many days (keeps D1 small).
HISTORY_RETENTION_DAYS = "30"
